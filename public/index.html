<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'/>
  <title>My DevOps App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    h1 span { color: #00ff88; }
    p { color: #aaa; margin-bottom: 2rem; }
    .badge { display: inline-block; background: #111; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; font-size: 13px; color: #00ff88; }
  </style>
</head>
<body>
  <div class='container'>
    <h1>Hello from <span>CI/CD!</span></h1>
    <p>Built with Node.js � Deployed with Docker � Hosted on AWS</p>
    <div class='badge'>Live</div>
  </div>
</body>
</html>
